name: Build and Deploy Wiki

on:
  # Run manually from the Actions tab
  workflow_dispatch:
  # Run automatically on the 1st of every month at 03:00 UTC
  schedule:
    - cron: '0 3 1 * *'

# Required for the official GitHub Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress deployments
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # 1. Build the wiki using the wikitiddler composite action
  # -------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wiki
        uses: ./        # Runs the composite action from this repository root
        id: wiki

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.wiki.outputs.output-dir }}/

  # -------------------------------------------------------------------------
  # 2. Deploy the artifact to GitHub Pages
  # -------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
